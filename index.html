<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yundou - Your Ultimate Music Experience</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <meta name="description" content="A premium Spotify-inspired music player UI.">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand" style="padding: 0 12px 12px 12px; display: flex; align-items: center; gap: 8px;">
                <img src="/images/logo.png" alt="Yundou Logo" class="brand-logo" style="width: 140px; filter: invert(1);">
            </div>
            <div class="nav-links">
                <a href="#" class="nav-item active">
                    <i data-lucide="home"></i>
                    <span>Home</span>
                </a>
                <a href="#" class="nav-item">
                    <i data-lucide="search"></i>
                    <span>Search</span>
                </a>
            </div>

            <div class="library-section">
                <div class="library-header">
                    <h2><i data-lucide="library"></i> Your Library</h2>
                    <i data-lucide="plus" style="cursor: pointer;"></i>
                </div>
                
                <div class="nav-links" id="user-playlists">
                    <div class="nav-item active" id="fav-all-time">
                        <i data-lucide="heart" style="color: var(--spotify-green);"></i>
                        <span>Fav of all time💕</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content" id="main-content">
            <header class="top-bar">
                <button class="menu-toggle" id="menu-toggle">
                    <i data-lucide="menu"></i>
                </button>
                <div class="nav-buttons">
                    <button class="nav-btn"><i data-lucide="chevron-left"></i></button>
                    <button class="nav-btn"><i data-lucide="chevron-right"></i></button>
                </div>
                <div class="search-container" id="search-container">
                    <i data-lucide="search"></i>
                    <input type="text" id="search-input" placeholder="What do you want to play?">
                </div>
            </header>

            <div class="content-wrapper">
                <h1 class="section-title">Fav of all time💕</h1>
                
                <div class="grid-container" id="playlist-grid">
                    <!-- Cards will be injected by JS -->
                </div>

                <h2 class="section-title" style="margin-top: 48px;">Discover More</h2>
                <div class="grid-container" id="made-for-you-grid">
                    <!-- More cards -->
                </div>
            </div>
        </main>

        <!-- Player Bar -->
        <footer class="player-bar">
            <div class="current-track">
                <img src="/images/chill.png" alt="Track Cover" class="track-img" id="current-track-img">
                <div class="track-info">
                    <h4 id="current-track-title">After Hours</h4>
                    <p id="current-track-artist">Midnight City</p>
                </div>
                <i data-lucide="heart" style="font-size: 16px; cursor: pointer; color: var(--text-sub);"></i>
            </div>

            <div class="player-controls">
                <div class="control-buttons">
                    <button class="nav-btn-alt" id="shuffle-btn"><i data-lucide="shuffle" style="width: 18px;"></i></button>
                    <button class="nav-btn-alt" id="prev-btn"><i data-lucide="skip-back"></i></button>
                    <div class="play-pause" id="play-pause-main">
                        <i data-lucide="play" id="main-play-icon"></i>
                    </div>
                    <button class="nav-btn-alt" id="next-btn"><i data-lucide="skip-forward"></i></button>
                    <button class="nav-btn-alt" id="repeat-btn"><i data-lucide="repeat" style="width: 18px;"></i></button>
                </div>
                <div class="playback-bar">
                    <span id="current-time">0:00</span>
                    <div class="progress-slider" id="progress-slider">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <span id="duration">0:00</span>
                </div>
            </div>

        </footer>
    </div>

    <!-- Playlist Creation Popup -->
    <div class="modal" id="playlist-modal">
        <div class="modal-content">
            <h3>Playlist Name</h3>
            <input type="text" id="new-playlist-name" placeholder="Enter playlist name">
            <div class="song-selector-list" id="song-selector-list">
                <!-- Songs with checkboxes will be injected here -->
            </div>
            <div class="modal-actions">
                <button class="btn btn-save" id="save-playlist-btn">Save</button>
                <button class="btn btn-cancel" id="cancel-playlist-btn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Context Menu -->
    <div class="context-menu" id="song-context-menu">
        <div class="menu-item" id="menu-add-queue"><i data-lucide="list-music"></i> Add to Queue</div>
        <div class="menu-item" id="menu-add-fav"><i data-lucide="heart"></i> Add to Favorites</div>
        <div class="menu-item" id="menu-remove"><i data-lucide="trash-2"></i> Remove from Playlist</div>
        <div class="menu-item" id="menu-share"><i data-lucide="share-2"></i> Share</div>
    </div>
    <script type="module" src="/main.js"></script>
</body>
</html>
